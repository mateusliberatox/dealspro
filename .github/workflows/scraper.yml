name: Scraper

on:
  schedule:
    - cron: '*/2 * * * *'   # fallback — primary trigger is cron-job.org
  workflow_dispatch:

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DISCORD_WEBHOOK_URL:       ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_FREE_WEBHOOK_URL:  ${{ secrets.DISCORD_FREE_WEBHOOK_URL }}
      DISCORD_BOT_TOKEN:         ${{ secrets.DISCORD_BOT_TOKEN }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      HEADLESS:                  'true'
      SCRAPE_MAX_CATEGORIES:     '26'
      SCRAPE_PAGES:              '2'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browser
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: npm run scrape:once
